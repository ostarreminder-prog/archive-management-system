<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SignMy — تغيير كلمة المرور</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
:root{--bg:#f4f3ee;--card:#fdfcf8;--border:#d2cbbf;--accent:#a65a2a;--accent-dim:rgba(166,90,42,.12);--gold:#b7791f;--text:#3a291d;--text2:#6a4a34;--text3:#9a7358;--red:#dc2626;--green:#2f855a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;direction:rtl}
.card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:40px 36px;box-shadow:0 18px 36px rgba(22,44,36,.14)}
.card::before{content:'';display:block;width:48px;height:48px;background:linear-gradient(135deg,var(--gold),#f59e0b);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 20px;text-align:center;line-height:48px}
h1{font-size:20px;font-weight:700;text-align:center;margin-bottom:6px}
.sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:28px;line-height:1.6}
.notice{background:rgba(232,168,48,.08);border:1px solid rgba(232,168,48,.2);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--gold);margin-bottom:20px;line-height:1.6}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text3);margin-bottom:7px;letter-spacing:.5px}
.field input{width:100%;background:#ffffff;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:14px;outline:none;transition:all .2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.strength{height:4px;border-radius:2px;margin-top:6px;transition:all .3s;background:var(--border)}
.strength-text{font-size:11px;color:var(--text3);margin-top:4px}
.rules{font-size:12px;color:var(--text3);margin:12px 0;line-height:1.8}
.rules span{display:block}
.rules span.ok{color:var(--green)}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#8b451f);border:none;border-radius:10px;color:#fff;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:6px}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(166,90,42,.25)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none}
.err.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div style="width:48px;height:48px;background:linear-gradient(135deg,var(--gold),#f59e0b);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 20px"><i class="fa-solid fa-key"></i></div>
  <h1>تغيير كلمة المرور</h1>
  <div class="sub">أول دخول — يجب تغيير الباسورد المؤقت الآن</div>
  <div class="notice"><i class="fa-solid fa-triangle-exclamation"></i> الباسورد الذي أُرسل لك مؤقت ولا يمكن الاستمرار بدون تغييره</div>
  <div class="err" id="err"></div>
  <div class="field">
    <label>كلمة المرور الجديدة</label>
    <input type="password" id="p1" placeholder="أدخل كلمة مرور قوية" oninput="checkStrength()">
    <div class="strength" id="strength-bar"></div>
    <div class="strength-text" id="strength-text"></div>
  </div>
  <div class="rules" id="rules">
    <span id="r-len"><i class="fa-solid fa-circle-xmark"></i> 8 أحرف على الأقل</span>
    <span id="r-num"><i class="fa-solid fa-circle-xmark"></i> يحتوي على رقم</span>
    <span id="r-cap"><i class="fa-solid fa-circle-xmark"></i> يحتوي على حرف كبير</span>
  </div>
  <div class="field">
    <label>تأكيد كلمة المرور</label>
    <input type="password" id="p2" placeholder="أعد كتابة كلمة المرور" onkeydown="if(event.key==='Enter')submit()">
  </div>
  <button class="btn" onclick="submit()" id="btn">حفظ وتسجيل الدخول</button>
</div>
<script>
function checkStrength(){
  const v=document.getElementById('p1').value;
  const len=v.length>=8, num=/\d/.test(v), cap=/[A-Z]/.test(v);
  document.getElementById('r-len').className=len?'ok':'';
  document.getElementById('r-len').innerHTML=`<i class="fa-solid ${len?'fa-circle-check':'fa-circle-xmark'}"></i> 8 أحرف على الأقل`;
  document.getElementById('r-num').className=num?'ok':'';
  document.getElementById('r-num').innerHTML=`<i class="fa-solid ${num?'fa-circle-check':'fa-circle-xmark'}"></i> يحتوي على رقم`;
  document.getElementById('r-cap').className=cap?'ok':'';
  document.getElementById('r-cap').innerHTML=`<i class="fa-solid ${cap?'fa-circle-check':'fa-circle-xmark'}"></i> يحتوي على حرف كبير`;
  const score=[len,num,cap].filter(Boolean).length;
  const bar=document.getElementById('strength-bar');
  const txt=document.getElementById('strength-text');
  const colors=['#f87171','#fb923c','#34d399'];
  const labels=['ضعيف','متوسط','قوي'];
  bar.style.background=score?colors[score-1]:getComputedStyle(document.documentElement).getPropertyValue('--border');
  bar.style.width=score?`${score*33.3}%`:'0';
  txt.textContent=score?labels[score-1]:'';
  txt.style.color=score?colors[score-1]:'';
}
async function submit(){
  const p1=document.getElementById('p1').value;
  const p2=document.getElementById('p2').value;
  if(p1.length<8) return showErr('الباسورد يجب أن يكون 8 أحرف على الأقل');
  if(p1!==p2) return showErr('كلمتا المرور غير متطابقتان');
  const btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='جارٍ الحفظ...';
  const res=await fetch('/api/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({new_password:p1})});
  const data=await res.json();
  btn.disabled=false; btn.textContent='حفظ وتسجيل الدخول';
  if(data.success) window.location.href=data.redirect;
  else showErr(data.error);
}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show');}
</script>
</body>
</html>
