<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignMy — تأكيد الجهاز</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:#07090f;color:#e4e8f4;
     min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl}
.card{background:#0e1018;border:1px solid #1c2133;border-radius:20px;
      padding:48px 40px;text-align:center;max-width:420px;width:90%}
.icon{font-size:64px;margin-bottom:20px}
h1{font-size:22px;font-weight:900;margin-bottom:12px}
p{color:#8892aa;font-size:14px;line-height:1.7;white-space:pre-line}
.btn{display:inline-block;margin-top:28px;padding:12px 32px;
     background:linear-gradient(135deg,#a65a2a,#8b451f);
     color:#fff;text-decoration:none;border-radius:10px;font-weight:700;font-size:14px}
</style>
</head>
<body>
<div class="card">
     <div class="icon">{% if success %}<i class="fa-solid fa-circle-check"></i>{% else %}<i class="fa-solid fa-lock"></i>{% endif %}</div>
  <h1>{{ 'تم التأكيد' if success else 'تم الإجراء' }}</h1>
  <p>{{ msg }}</p>
  {% if success %}
  <a href="/login" class="btn">تسجيل الدخول الآن</a>
  {% endif %}
</div>
</body>
</html>
